env:
    AWS_REGION: us-east-1
name: Deploy portfolio


on:
    push:
        branches:
            - main

permissions:
    id-token: write
    contents: read

jobs:
    terraform:
        name: Terraform plan & apply
        runs-on: ubuntu-latest

        steps:
          - name: Checkout code
            uses: actions/checkout@v4

          - name: Configure AWS credentials (Terraform role)
            uses: aws-actions/configure-aws-credentials@v4
            with:
                role-to-assume: ${{ secrets.TERRAFORM_ROLE_ARN }}
                aws-region: ${{ env.AWS_REGION }}

          - name: Setup Terraform
            uses: hashicorp/setup-terraform@v3
            with:
                terraform_version: "~>1.14"

          
          - name: Terraform init
            working-directory: infra
            run: terraform init -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" 
              

          - name: Terraform plan
            working-directory: infra
            run: terraform plan

          - name: Terraform apply
            working-directory: infra
            run: terraform apply -auto-approve

    deploy:
        name: Deploy site
        runs-on: ubuntu-latest
        needs: terraform # waits for Terraform job to finish first

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Configure AWS credentials (Terraform role)
              uses: aws-actions/configure-aws-credentials@v4
              with:
                role-to-assume: ${{ secrets.DEPLOY_ROLE_ARN }}
                aws-region: ${{ env.AWS_REGION }}

            - name: Sync site to S3
              run: aws s3 sync site/ s3://${{ secrets.SITE_BUCKET_NAME }} --delete

            - name: Invalidate CloudFront cache
              run: |
                aws cloudfront create-invalidation \
                --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
                --paths "/*"

